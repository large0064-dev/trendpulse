<!DOCTYPE html>
<html>
<head>
  <title>TrendPulse - Trending Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .title {
      margin-top: 10px;
    }

    .section {
      margin-top: 20px;
    }

    .product {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<header>
  🔥 TrendPulse - Trending Hub
</header>

<div class="container">

  <input class="search" placeholder="Search trending topics...">

  <div class="grid">
    <div class="card">📈<div class="title">Social Trends</div></div>
    <div class="card">📰<div class="title">News</div></div>
    <div class="card">👕<div class="title">Fashion</div></div>
    <div class="card">📱<div class="title">Tech</div></div>
    <div class="card">🎬<div class="title">Videos</div></div>
    <div class="card">🔥<div class="title">Viral</div></div>
  </div>

  <div class="section">
    <h3>🔥 Trending Product</h3>
    <div class="product">
      <h4>Stylish Shirt</h4>
      <a class="btn" href="https://amazon.in" target="_blank">Buy Now</a>
    </div>
  </div>

</div>

</body>
</html>
