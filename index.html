<!DOCTYPE html>
<html>
<head>
  <title>TrendPulse - Trending Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    header {
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      padding: 18px;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 15px;
    }

    .search {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
    }

    .card {
      background: #1e293b;
      padding: 15px;
      border-radius: 12px;
      margin-top: 10px;
    }

    .title {
      margin-top: 10px;
      text-align: center;
    }

    .section {
      margin-top: 20px;
    }

    .product {
      background: white;
      color: black;
      padding: 15px;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px;
      background: green;
      color: white;
      text-decoration: none;
      border-radius: 6px;
    }

    .ad-box {
      background: #111827;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      margin-top: 15px;
      border: 1px dashed #555;
    }
  </style>
</head>

<body>

<header>
  🔥 TrendPulse - Trending Hub
</header>

<div class="container">

  <input class="search" placeholder="Search trending topics...">

  <div class="grid">
    <div class="card">📈<div class="title">Social Trends</div></div>
    <div class="card">📰<div class="title">News</div></div>
    <div class="card">👕<div class="title">Fashion</div></div>
    <div class="card">📱<div class="title">Tech</div></div>
    <div class="card">🎬<div class="title">Videos</div></div>
    <div class="card">🔥<div class="title">Viral</div></div>
  </div>

  <!-- 🔥 LIVE NEWS -->
  <div class="section">
    <h3>🔥 Live Trending News</h3>
    <div id="news"></div>
  </div>

  <!-- 📢 ADS PLACE -->
  <div class="ad-box">
    📢 Advertisement Space (AdSense / Affiliate)
  </div>

  <!-- 💰 PRODUCT -->
  <div class="section">
    <h3>🛒 Trending Product</h3>
    <div class="product">
      <h4>Stylish Shirt</h4>
      <a class="btn" href="https://amazon.in" target="_blank">Buy Now</a>
    </div>
  </div>

</div>

<script>
async function loadNews() {
  try {
    const res = await fetch("https://trend-backend-h6ix.onrender.com/news");
    const data = await res.json();

    let newsContainer = document.getElementById("news");

    data.articles.slice(0, 10).forEach(article => {
      let div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${article.title}</h3>
        <p>${article.description || "No description available"}</p>
        <a class="btn" href="${article.url}" target="_blank">Read More</a>
      `;

      newsContainer.appendChild(div);
    });

  } catch (error) {
    console.log("Error:", error);
  }
}

loadNews();
</script>

</body>
</html>
